<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Paragraph Generator</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/liquid-glass/48/paragraph.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>Tired of boring Lorem Ipsum😅?</h1>
        </header>
        <h4>Enter the number of sample paragraphs you would like to generate.</h4>
        <form id="lorem-form" class="controls">
            <label for="amount">Paragraphs:</label>
            <input type="number" id="amount" value="1" min="1" max="10">
            <button type="submit">Generate</button>
        </form>

        <article id="result"></article>
    </div>

    <script src="Script.js"></script>

</body>
</html>
